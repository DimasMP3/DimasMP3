name: Metrics
on:
  # Update otomatis setiap jam 00:00
  schedule: [{cron: "0 0 * * *"}]
  # Bisa dijalankan manual lewat tab Actions
  workflow_dispatch:
  # Update otomatis saat ada push di branch main/master
  push: {branches: ["master", "main"]}
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          
          # Konfigurasi dasar
          config_timezone: Asia/Jakarta
          
          # Menampilkan bahasa pemrograman yang sering dipakai
          plugin_languages: yes
          plugin_languages_ignored: html, css
          
          # Menampilkan habit/kebiasaan coding
          plugin_habits: yes
          plugin_habits_from: 50
          plugin_habits_days: 5
          plugin_habits_facts: yes
          plugin_habits_charts: yes
