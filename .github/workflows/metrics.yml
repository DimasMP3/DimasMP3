name: Metrics
on:
  schedule: [{cron: "0 0 * * *"}]
  workflow_dispatch:
  push: {branches: ["master", "main"]}
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@v3.33.0
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          config_timezone: Asia/Jakarta
          
          # 1. Base & Languages (Fondasi utama)
          plugin_languages: yes
          plugin_languages_ignored: html, css, jupyter notebook
          plugin_languages_details: bytes-size, percentage
          plugin_lines: yes
          
          # 2. Topics (Sangat krusial untuk memamerkan Tech Stack)
          plugin_topics: yes
          plugin_topics_mode: icons
          plugin_topics_limit: 15
          
          # 3. Activity (Menampilkan riwayat Push, PR, & Issue terbaru)
          plugin_activity: yes
          plugin_activity_limit: 5
          plugin_activity_days: 14
          plugin_activity_filter: push, issue, pr
          
          # 4. Repositories (Statistik mendalam tentang repo yang kamu buat)
          plugin_repositories: yes
          plugin_repositories_affiliations: owner
          plugin_repositories_batch: 100
          
          # 5. Stars (Menunjukkan repo dari developer lain yang kamu jadikan referensi)
          plugin_stars: yes
          plugin_stars_limit: 4
          
          # 6. Achievements & Isocalendar (Estetika & Gamifikasi)
          plugin_achievements: yes
          plugin_achievements_display: compact
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year
          
          # 7. Habits (Riwayat kebiasaan ngoding yang sudah diringankan)
          plugin_habits: yes
          plugin_habits_from: 100
          plugin_habits_days: 14
          plugin_habits_facts: yes
          plugin_habits_charts: no
